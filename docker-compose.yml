version: '3.8'

# 简化的本地部署：应用 + Redis（短期记忆）+ Chroma 本地持久卷。
# 删除原 Traefik 反向代理与多课程实例——那套缺少健康检查 / 数据卷 / 真实域名，
# 对单人演示属于「虚的生产化包装」，反而不易讲清。

services:
  redis:
    image: redis:7-alpine
    container_name: tutor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - edu

  app:
    build: .
    container_name: tutor_app
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=8003
    ports:
      - "8003:8003"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_db
      - ./data:/app/data:ro
    networks:
      - edu

networks:
  edu:
    driver: bridge

volumes:
  redis_data:
  chroma_data:
